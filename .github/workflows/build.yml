name: Build and Pack (Windows only)

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
  VCPKG_COMMIT: a42af01b72c28a8e1d7b48107b33e4f286a55ef6
  VCPKG_DEFAULT_TRIPLET: x64-windows

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          ref: ${{ env.VCPKG_COMMIT }}
          path: vcpkg

      - name: Bootstrap vcpkg
        run: .\vcpkg\bootstrap-vcpkg.bat

      - name: Install Boost
        run: |
          # Must match ur_rtde find_package(Boost ... system thread program_options)
          & "$env:VCPKG_ROOT\vcpkg.exe" install `
            boost-system:x64-windows `
            boost-thread:x64-windows `
            boost-program-options:x64-windows

      - name: Clone and build ur_rtde
        run: |
          $urRtdeCommit = "68ac4e18f357f8e9361bfc5eef344acd9aa241be"
          git clone --recursive https://gitlab.com/sdurobotics/ur_rtde.git
          cd ur_rtde
          git checkout $urRtdeCommit
          mkdir build
          cd build
          $vcpkgToolchain = Join-Path $env:VCPKG_ROOT "scripts\buildsystems\vcpkg.cmake"
          cmake .. -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DPYTHON_BINDINGS=OFF `
            -DCMAKE_TOOLCHAIN_FILE="$vcpkgToolchain"
          cmake --build . --config Release
          cmake --install . --prefix ../install

      - name: Build C API Facade
        run: |
          cd native/facade
          mkdir build
          cd build
          $vcpkgToolchain = Join-Path $env:VCPKG_ROOT "scripts\buildsystems\vcpkg.cmake"
          cmake .. -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -Dur_rtde_DIR="${{ github.workspace }}/ur_rtde/install/lib/cmake/ur_rtde" `
            -DCMAKE_TOOLCHAIN_FILE="$vcpkgToolchain"
          cmake --build . --config Release

      - name: Copy native artifacts
        run: |
          New-Item -ItemType Directory -Force -Path src\UR.RTDE\runtimes\win-x64\native | Out-Null
          Copy-Item native\facade\build\Release\*.dll src\UR.RTDE\runtimes\win-x64\native\
          Copy-Item ur_rtde\install\bin\rtde.dll src\UR.RTDE\runtimes\win-x64\native\
          Copy-Item "$env:VCPKG_ROOT\installed\x64-windows\bin\boost_thread*.dll" src\UR.RTDE\runtimes\win-x64\native\ -ErrorAction SilentlyContinue

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build managed
        run: dotnet build --configuration Release --no-restore

      - name: Pack NuGet
        run: dotnet pack src/UR.RTDE/UR.RTDE.csproj --configuration Release --no-build --output nupkg

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-win-x64
          path: src/UR.RTDE/runtimes/win-x64/native/

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: nupkg/*.nupkg
